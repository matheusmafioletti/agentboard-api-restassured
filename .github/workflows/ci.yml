name: API Tests — RestAssured + Cucumber

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'local'
        type: choice
        options: [local, staging]
      tags:
        description: 'Cucumber tag filter (e.g. @smoke)'
        required: false
        default: '@smoke'

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentboard
          POSTGRES_USER: agentboard
          POSTGRES_PASSWORD: agentboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Run smoke tests
        run: |
          mvn test \
            -Denv=${{ github.event.inputs.environment || 'local' }} \
            -Dcucumber.filter.tags="${{ github.event.inputs.tags || '@smoke' }}"

      - name: Generate Allure report
        if: always()
        run: mvn allure:report

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 30

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          retention-days: 30
